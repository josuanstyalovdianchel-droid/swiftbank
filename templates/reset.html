{% extends "base.html" %}
{% block content %}
<div class="auth-wrap">
  <form method="post" action="/reset" class="auth-card">
    <h2>Set a new password — {{ username }}</h2>
    <input type="hidden" name="token" value="{{ token }}">
    <label>New password<input name="password" type="password" required></label>
    <button class="btn primary block">Save password</button>
  </form>
</div>
{% endblock %}
