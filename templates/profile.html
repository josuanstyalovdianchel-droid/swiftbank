{% extends "base.html" %}
{% block content %}
<h2>Your profile</h2>
<div class="profile-grid">
  <div class="auth-card">
    <img class="avatar" src="{{ me.avatar }}" alt="">
    <form method="post" action="/profile/avatar" enctype="multipart/form-data">
      <label>Upload new avatar<input type="file" name="avatar"></label>
      <button class="btn ghost block">Upload</button>
    </form>
  </div>

  <form method="post" action="/profile" class="auth-card">
    <h3>Personal details</h3>
    <label>Full name<input name="full_name" value="{{ me.full_name or '' }}"></label>
    <label>Email<input name="email" value="{{ me.email or '' }}"></label>
    <label>SSN<input name="ssn" value="{{ me.ssn or '' }}"></label>
    <label>Bio (HTML allowed)<textarea name="bio">{{ me.bio or '' }}</textarea></label>
    <label>New password<input name="password" type="password"></label>
    <button class="btn primary block">Save changes</button>
  </form>

  <div class="auth-card">
    <h3>About me</h3>
    <!-- VULN: stored XSS — bio rendered raw -->
    <div class="bio">{{ me.bio|safe if me.bio else '<em class="muted">No bio yet.</em>'|safe }}</div>
  </div>
</div>
{% endblock %}
