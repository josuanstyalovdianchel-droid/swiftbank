{% extends "base.html" %}
{% block content %}
<h2>Search results</h2>
<!-- VULN: reflected XSS — q rendered with |safe -->
<p>You searched for: {{ q|safe }}</p>
<table class="data">
  <thead><tr><th>Date</th><th>Amount</th><th>Memo</th></tr></thead>
  <tbody>
  {% for t in rows %}
    <tr><td>{{ t.created_at }}</td><td>€ {{ '%.2f' % t.amount }}</td><td>{{ t.memo|safe }}</td></tr>
  {% endfor %}
  </tbody>
</table>
{% if not rows %}<p class="muted">No matches.</p>{% endif %}
{% endblock %}
