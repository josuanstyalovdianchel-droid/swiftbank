{% extends "base.html" %}
{% block content %}
<div class="auth-wrap wide">
  <form method="post" action="/transfer" class="auth-card">
    <h2>Send money</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <label>From account
      <select name="from_id">
        {% for a in accounts %}
          <option value="{{ a.id }}">{{ a.name }} — {{ a.number }} (€ {{ '%.2f' % a.balance }})</option>
        {% endfor %}
      </select>
    </label>
    <label>To IBAN / account number
      <input name="to_number" placeholder="ES99-1111-2222-0004" list="payees" required>
    </label>
    <datalist id="payees">
      {% for p in payees %}<option value="{{ p.account_number }}">{{ p.nickname }}</option>{% endfor %}
    </datalist>
    <label>Amount (€)
      <input name="amount" type="number" step="0.01" value="50.00" required>
    </label>
    <label>Memo<input name="memo" placeholder="What's it for?"></label>
    <button class="btn primary block">Confirm transfer</button>
    <p class="hint">No additional authentication needed for transfers under €10,000.</p>
  </form>
</div>
{% endblock %}
